<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JiruEdu</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-page auth-page-compact">
    <div class="auth-container auth-container-compact">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Sign in to open the dashboard for your role.</p>
        </div>

        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username" autocapitalize="none" spellcheck="false" required>
                <p id="login-username-help" class="field-help">Use the account assigned to your student, teacher, admin, or system-admin role.</p>
            </div>

            <div class="form-group">
                <label for="login-password">Password</label>
                <div class="password-field">
                    <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" data-toggle-password="login-password" aria-label="Show password">Show</button>
                </div>
                <p id="login-password-help" class="field-help">Repeated failed attempts are temporarily blocked for security.</p>
            </div>

            <div class="form-group">
                <label>Role</label>
                <div class="role-selector">
                    <label class="radio-card">
                        <input type="radio" name="role" value="student" checked>
                        <span>Student</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="role" value="teacher">
                        <span>Teacher</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="role" value="admin">
                        <span>School Admin</span>
                    </label>
                    <label class="radio-card">
                        <input type="radio" name="role" value="system_admin">
                        <span>System Admin</span>
                    </label>
                </div>
            </div>

            <button id="login-submit" type="submit" class="btn btn-primary btn-block">Login</button>
            <p id="login-status" class="status-banner" aria-live="polite"></p>
        </form>

        <div class="auth-footer">
            <p class="text-center">Need a student or teacher account? <a href="/signup.html">Create one</a></p>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
