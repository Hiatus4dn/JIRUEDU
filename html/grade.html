<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Grade - JiruEdu</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body class="selection-page">
    <header class="app-header">
        <h3>Select Grade</h3>
    </header>

    <main class="grid-container">
        <div class="grade-card">
            <h4>Grade 1–3</h4>
            <p>Primary School</p>
        </div>
        <div class="grade-card">
            <h4>Grade 4–6</h4>
            <p>Upper Primary</p>
        </div>
        <div class="grade-card">
            <h4>Grade 7–9</h4>
            <p>Middle School</p>
        </div>
        <div class="grade-card active">
            <h4>Grade 10–12</h4>
            <p>High School</p>
        </div>
    </main>
   <script src="/script.js"></script>
</body>
</html>
